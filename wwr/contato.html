<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fale Conosco | White Water Rafting</title>
    <meta name="description" content="Para registrar uma manifestação preencha o formulário abaixo:">
    <meta name="author" content="Claudio Englert">
    <link rel="stylesheet" href="estilos/rafting.css">
</head>

<body>
    <header>
        <img src="imagens/z-raftingbw.png" alt="Logotipo da empresa de Rafting">
        <nav>
            <ul>
                <li><a href="index.html">Página Inicial</a></li>
                <li><a href="sobre.html">Sobre Nós</a></li>
                <li><a href="passeios.html">Passeios</a></li>
                <li><a href="contato.html">Fale Conosco</a></li>
            </ul>

        </nav>
    </header>

    <main>
        <section class="contato-info">
            <h1>
                Fale Conosco | White Water Rafting
            </h1>
            <address>
                Rua das Couves, 999 <br>
                +55 51 98899-9988 <br>
                contato@whitewater.com
            </address>
        </section>

        <section class="contato-form">
            <div class="map">
                <iframe
                    src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d1974.970136132635!2d-55.79143326213425!3d-29.77875953956429!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e1!3m2!1spt-BR!2sbr!4v1780577819593!5m2!1spt-BR!2sbr"
                    allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
            <form>
                <label for="q1">Nome:</label>
                <input type="text" name="q1" id="q1">

                <label for="q2">Email:</label>
                <input type="text" name="q2" id="q2">

                <p>Propósito da Mensagem</p>
                <label for="q3a"><input type="radio" name="q3" id="q3a" value="1"> Dúvida Geral</label>
                <label for="q3b"><input type="radio" name="q3" id="q3b" value="2"> Pergunta sobre Reserva</label>
                <label for="q3c"><input type="radio" name="q3" id="q3c" value="3"> Sugestão</label>

                <label for="q4">Mensagem</label>
                <textarea name="q4" id="q4"></textarea>

                <label for="q5">
                    <input type="checkbox" name="q5" id="q5" value="sim">
                    Por favor, me inscreva na newsletter mensal
                </label>

                <button type="submit">Entrar em Contato</button>
            </form>
        </section>

        <section class="funcionarios">
            <h2>Estamos aqui para servi-lo!</h2>
            <figure>
                <img src="imagens/func1.svg" alt="Foto de Carlos Mendes">
                <figcaption>Carlos Mendes<br>Guia Chefe</figcaption>
            </figure>
            <figure>
                <img src="imagens/func2.svg" alt="Foto de Ana Pereira">
                <figcaption>Ana Pereira<br>Instrutora de Segurança</figcaption>
            </figure>
            <figure>
                <img src="imagens/func3.svg" alt="Foto de João Oliveira">
                <figcaption>João Oliveira<br>Coordenador de Passeios</figcaption>
            </figure>
        </section>

    </main>

    <footer>
        <p>© 2026 White Water Rafting | Claudio Englert</p>
        <nav class="redes-sociais">
            <a href="https://facebook.com">
                <img src="imagens/facebook.svg" alt="Logo do facebook">
            </a>
            <a href="https://instagram.com">
                <img src="imagens/instagram.svg" alt="Logo do Instagram">
            </a>
            <a href="https://linkedin.com">
                <img src="imagens/linkedin.svg" alt="Logo do LinkedIn">
            </a>

        </nav>
    </footer>
</body>

</html>
