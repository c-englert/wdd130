<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página Inicial | White Water Rafting</title>
    <meta name="description" content="White Water Rafting: aventuras de rafting em águas bravas com segurança desde 1964. Inscreva-se na newsletter e conheça nossos passeios.">
    <meta name="author" content="Claudio Englert">
    <link rel="stylesheet" href="estilos/rafting.css">
</head>

<body>
    <header>
        <img src="imagens/z-raftingbw.png" alt="Logotipo da empresa de Rafting">
        <nav>
            <ul>
                <li><a href="index.html">Página Inicial</a></li>
                <li><a href="sobre.html">Sobre Nós</a></li>
                <li><a href="passeios.html">Passeios</a></li>
                <li><a href="contato.html">Fale Conosco</a></li>
            </ul>

        </nav>
    </header>
    <main>
        <div class="hero">
            <img src="imagens/rafting64_1024.jpg" alt="Pessoas se divertindo fazendo rafting.">
            <h1>White Water Rafting</h1>
            <h2>A aventura começa aqui!</h2>
            <a href="passeios.html" class="cta">Conheça nossos passeios</a>
        </div>

        <section class="ofertas">
            <h2>Por que remar com a gente?</h2>
            <div class="grade-ofertas">
                <figure class="card">
                    <img src="imagens/rafting53_600.jpg" alt="Guia conduzindo o bote entre as rochas">
                    <figcaption>
                        <h3>Guias certificados</h3>
                        <p>Equipe experiente e treinada nas melhores práticas de segurança desde 1964.</p>
                    </figcaption>
                </figure>
                <figure class="card">
                    <img src="imagens/rafting20_600.jpg" alt="Remos coloridos apoiados no bote">
                    <figcaption>
                        <h3>Para todos os níveis</h3>
                        <p>Roteiros do iniciante ao aventureiro experiente, com corredeiras para cada perfil.</p>
                    </figcaption>
                </figure>
                <figure class="card">
                    <img src="imagens/rafting59_600.jpg" alt="Equipe equipada pronta para a descida">
                    <figcaption>
                        <h3>Equipamento incluso</h3>
                        <p>Coletes, capacetes e botes certificados para você só se preocupar em se divertir.</p>
                    </figcaption>
                </figure>
            </div>
        </section>

        <section class="newsletter">
            <h2>Inscreva-se na nossa Newsletter</h2>
            <form action="#" method="get">
                <div class="campo">
                    <label for="nome">Nome</label>
                    <input type="text" id="nome" name="nome" required>
                </div>
                <div class="campo">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <button type="submit">Inscrever-se</button>
            </form>
        </section>
    </main>

    <footer>
        <p>© 2026 White Water Rafting | Claudio Englert</p>
        <nav class="redes-sociais">
            <a href="https://facebook.com">
                <img src="imagens/facebook.svg" alt="Logo do facebook">
            </a>
            <a href="https://instagram.com">
                <img src="imagens/instagram.svg" alt="Logo do Instagram">
            </a>
            <a href="https://linkedin.com">
                <img src="imagens/linkedin.svg" alt="Logo do LinkedIn">
            </a>

        </nav>
    </footer>
</body>

</html>
